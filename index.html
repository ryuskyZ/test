<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <script src="https://cdn.tailwindcss.com">
  </script>
</head>
<body class="m-0 p-0 min-h-screen justify-center flex items-center" >
  <form action="a.htm" method="get" accept-charset="utf-8">
    
  <div class="bg-gray-200 p-5 rounded-3xl">
    <p class="font-extrabold text-2xl  text-center">LOGIN</p>
    <input type="email" placeholder="EMAIL" class="text-center mt-3" required/>
    <br>
    <input type="password" placeholder="PASSWORD" class="text-center mt-3 mb-3" id="pw" required/>
    <br>
    <label class="text-center mt-3 cursor-pointer">
      <p class="mt-3"> <input type="checkbox" id="showpw"/> Show Password</p>
    </label>
    <p class="text-center mt-3">No Have Account? <a href="#" class="text-blue-300 font-black mt3">Signup</a></p>
    <button class="block mx-auto bg-blue-500 pt-1 pb-1 pl-5 pr-5 mt-3 font-semibold">LOGIN</button>
  </div>
  </form>
  <script>
const pw = document.getElementById("pw");
const showpw = document.getElementById("showpw");

showpw.addEventListener("change", function() {
  if (this.checked) {
    pw.type = "text";
  } else {
    pw.type = "password";
  }
});
</script>
</body>
</html>
