<html lang="en">

  <link rel="stylesheet" href="style.css">
  <title>Login</title>
</head>
<body>
  <form action="main.html">
    <div class="login">
      <h1>Login</h1>
      <input type="email" placeholder="Email">
      <br>
      <input type="password" placeholder="Password" id="pw">
      <label>
      <p><input type="checkbox" id="showpw" /> Show Password</p>
      </label>
      <p>Forget Password? <a href="fgpw">Here</a></p>
      <p>No Have Account? <a href="signup">Signup</a></p>
      <button type="submit">Login</button>
    </div>
  </form>
<script src="script.js">
</script>
</body>
</html>
